<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDL — Agendar Conversa</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'DM Sans',sans-serif;
    min-height:100vh;
    background:linear-gradient(165deg,#0a1628 0%,#122040 40%,#1a2d5a 70%,#0f1d3a 100%);
    color:#e8ecf4;
    overflow-x:hidden;
  }
  body::before{
    content:'';position:fixed;top:0;left:0;right:0;bottom:0;
    background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events:none;z-index:0;
  }
  .container{max-width:780px;margin:0 auto;padding:40px 24px;position:relative;z-index:1}
  .header{text-align:center;margin-bottom:48px}
  .badge{
    display:inline-block;padding:6px 16px;border-radius:100px;
    background:rgba(194,163,112,.12);border:1px solid rgba(194,163,112,.25);
    font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    color:#c2a370;margin-bottom:20px;
  }
  h1{
    font-family:'Fraunces',serif;font-size:clamp(24px,5vw,36px);font-weight:700;
    color:#fff;margin:0 0 12px;line-height:1.2;
    text-shadow:0 2px 20px rgba(0,0,0,.3);
  }
  .subtitle{font-size:15px;color:rgba(232,236,244,.55);line-height:1.6}
  .day-section{margin-bottom:32px}
  .day-header{
    font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:#c2a370;
    margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(194,163,112,.15);
  }
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
  .slot{
    padding:10px 6px;border-radius:10px;text-align:center;cursor:pointer;
    transition:all .2s ease;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
  }
  .slot:hover:not(.booked){background:rgba(194,163,112,.1);border-color:rgba(194,163,112,.25)}
  .slot.selected{
    background:rgba(194,163,112,.2);border:1.5px solid #c2a370;
    transform:scale(1.03);box-shadow:0 4px 20px rgba(194,163,112,.15);
  }
  .slot.booked{opacity:.4;cursor:default;background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.04)}
  .slot-time{font-size:15px;font-weight:600;color:#fff}
  .slot-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:3px}
  .slot.booked .slot-sub{font-style:italic;color:rgba(255,255,255,.35)}
  .booking-form{
    margin-top:32px;padding:28px;border-radius:16px;
    background:rgba(255,255,255,.04);border:1px solid rgba(194,163,112,.2);
    backdrop-filter:blur(10px);
  }
  .form-label{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:14px}
  .form-label strong{color:#c2a370}
  input[type="text"],input[type="password"]{
    width:100%;padding:14px 18px;border-radius:10px;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    color:#fff;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;
  }
  input[type="text"]:focus,input[type="password"]:focus{border-color:rgba(194,163,112,.4)}
  .btn{
    padding:14px 32px;border-radius:10px;border:none;cursor:pointer;
    font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;
    transition:all .2s ease;
  }
  .btn-primary{
    background:linear-gradient(135deg,#c2a370,#a8864e);color:#0a1628;
    box-shadow:0 4px 16px rgba(194,163,112,.3);
  }
  .btn-primary:hover{box-shadow:0 6px 24px rgba(194,163,112,.4);transform:translateY(-1px)}
  .btn-primary:disabled{opacity:.5;cursor:default;transform:none}
  .btn-secondary{background:rgba(255,255,255,.08);color:#e8ecf4}
  .btn-secondary:hover{background:rgba(255,255,255,.12)}
  .confirmation{
    margin-top:32px;padding:28px;border-radius:16px;text-align:center;
    background:rgba(56,161,105,.08);border:1px solid rgba(56,161,105,.25);
  }
  .confirm-icon{font-size:28px;margin-bottom:8px}
  .confirm-title{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:#68d391;margin-bottom:8px}
  .confirm-detail{font-size:14px;color:rgba(255,255,255,.6)}
  .error-box{
    padding:14px 20px;border-radius:10px;margin-bottom:20px;text-align:center;
    background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;font-size:14px;
  }
  .admin-footer{text-align:center;margin-top:48px;padding-top:24px;border-top:1px solid rgba(255,255,255,.06)}
  .admin-toggle{background:none;border:none;color:rgba(255,255,255,.35);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline}
  .admin-card{padding:24px;border-radius:16px;margin-bottom:20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
  .admin-label{font-size:13px;font-weight:600;color:#c2a370;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
  .admin-pwd{display:flex;gap:8px;justify-content:center;align-items:center;margin-top:16px}
  .admin-pwd input{max-width:180px;text-align:center;font-size:14px}
  .pwd-error{font-size:12px;color:#fca5a5;margin-top:8px;text-align:center}
  table{width:100%;border-collapse:collapse;margin-top:16px;font-size:13px}
  th{text-align:left;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.08);color:#c2a370}
  td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.5)}
  td:first-child{color:#e8ecf4}
  .btn-danger{font-size:12px;color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
  .admin-summary{color:rgba(255,255,255,.5);margin-bottom:12px}
  .flex-btns{display:flex;gap:10px;margin-top:14px}
  .loading{text-align:center;padding-top:120px;font-size:14px;color:rgba(255,255,255,.4)}
  .center{text-align:center}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading" id="loading">Carregando...</div>
</div>
<script>
var API = "/.netlify/functions/slots";
var ADMIN_PIN = "PDLH1rro";
var TITLE = "Conversa com Renato Chiodaro sobre Programa de Desenvolvimento de Liderança - PDL";
var DAYS = {
  "2026-04-14": "Terça-feira, 14 de Abril",
  "2026-04-15": "Quarta-feira, 15 de Abril",
  "2026-04-16": "Quinta-feira, 16 de Abril",
};
var FIXED_SLOTS = {
  "2026-04-14": ["11:30","11:45","13:00","13:15","13:30","13:45"],
  "2026-04-15": ["08:30","08:45","09:00","09:15","09:30","09:45","10:00","10:15","10:30","10:45","11:00","11:15","11:30","11:45","12:00","12:15","12:30","12:45","13:00","13:15","13:30","13:45","15:30","15:45","16:00"],
  "2026-04-16": ["08:00","08:15","08:30","08:45","10:15","10:30","10:45","14:00","14:15","14:30","14:45","15:00","15:15","15:30","15:45","16:00"],
};
var state = { slots: null, selectedSlot: null, adminAuth: false, showAdmin: false, confirmation: null, error: null, ready: false };

function buildSlots() {
  var slots = {};
  var days = Object.keys(FIXED_SLOTS);
  for (var i = 0; i < days.length; i++) {
    var day = days[i];
    var times = FIXED_SLOTS[day];
    for (var j = 0; j < times.length; j++) {
      var id = day + "_" + times[j];
      slots[id] = { date: day, time: times[j], booked: false, name: null };
    }
  }
  return slots;
}

async function loadData() {
  try {
    var res = await fetch(API);
    var data = await res.json();
    if (data.config && data.slots) {
      state.slots = data.slots;
      state.ready = true;
    } else {
      var slots = buildSlots();
      var config = { title: TITLE, duration: 15, createdAt: new Date().toISOString() };
      await fetch(API, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "publish", config: config, slots: slots }) });
      state.slots = slots;
      state.ready = true;
    }
  } catch (e) {
    state.slots = buildSlots();
    state.ready = true;
  }
  render();
}

function render() {
  var app = document.getElementById("app");
  if (!state.ready) { app.innerHTML = '<div class="loading">Carregando...</div>'; return; }
  app.innerHTML = renderBooking();
  bindBooking();
}

function renderBooking() {
  var slots = state.slots || {};
  var total = Object.keys(slots).length;
  var booked = Object.values(slots).filter(function(s){return s.booked;}).length;
  var avail = total - booked;
  var byDay = {};
  for (var id in slots) { var sl = slots[id]; if (!byDay[sl.date]) byDay[sl.date] = []; byDay[sl.date].push({ id: id, date: sl.date, time: sl.time, booked: sl.booked, name: sl.name }); }
  for (var d in byDay) byDay[d].sort(function(a, b) { return a.time.localeCompare(b.time); });
  var html = '<div class="header"><div class="badge">15 min</div><h1>'+esc(TITLE)+'</h1><p class="subtitle">Escolha um horário disponível e insira seu nome para reservar.<br><span style="font-size:13px;opacity:.6">'+avail+' de '+total+' horários disponíveis</span></p></div>';
  if (state.error) html += '<div class="error-box">'+esc(state.error)+' <span style="cursor:pointer;margin-left:8px" id="closeError">✕</span></div>';
  if (state.confirmation) {
    var c = state.confirmation;
    html += '<div class="confirmation"><div class="confirm-icon">✓</div><div class="confirm-title">Reservado!</div><div class="confirm-detail">'+esc(c.name)+' — '+(DAYS[c.slot.date]||c.slot.date)+', '+c.slot.time+'</div><button class="btn btn-secondary" style="margin-top:16px;font-size:13px" id="closeConfirm">Fechar</button></div>';
  }
  var dayEntries = Object.entries(DAYS);
  for (var di = 0; di < dayEntries.length; di++) {
    var dayKey = dayEntries[di][0], dayLabel = dayEntries[di][1];
    if (!byDay[dayKey]) continue;
    html += '<div class="day-section"><div class="day-header">'+dayLabel+'</div><div class="grid">';
    for (var si = 0; si < byDay[dayKey].length; si++) {
      var s = byDay[dayKey][si];
      var cls = s.booked ? "slot booked" : (state.selectedSlot === s.id ? "slot selected" : "slot");
      var sub = s.booked ? '<div class="slot-sub">Reservado</div>' : '<div class="slot-sub">15 min</div>';
      html += '<div class="'+cls+'" data-slot="'+s.id+'"><div class="slot-time">'+s.time+'</div>'+sub+'</div>';
    }
    html += '</div></div>';
  }
  if (state.selectedSlot && !state.confirmation && slots[state.selectedSlot]) {
    var ss = slots[state.selectedSlot];
    html += '<div class="booking-form"><div class="form-label">Horário selecionado: <strong>'+ss.time+' — '+(DAYS[ss.date]||ss.date)+'</strong></div><input type="text" id="nameInput" placeholder="Seu nome completo" autofocus><div class="flex-btns"><button class="btn btn-primary" id="bookBtn">Confirmar Reserva</button><button class="btn btn-secondary" id="cancelBtn">Cancelar</button></div></div>';
  }
  html += '<div class="admin-footer"><button class="admin-toggle" id="adminToggle">'+(state.showAdmin ? "Ocultar painel" : "Administração")+'</button>';
  if (state.showAdmin && !state.adminAuth) {
    html += '<div class="admin-pwd"><input type="password" id="adminPwd" placeholder="Senha de acesso"><button class="btn btn-secondary" id="adminLoginBtn">Entrar</button></div><div class="pwd-error" id="pwdError" style="display:none">Senha incorreta</div>';
  }
  if (state.showAdmin && state.adminAuth) {
    var bookedList = Object.values(slots).filter(function(s){return s.booked;}).sort(function(a,b){return (a.date+"_"+a.time).localeCompare(b.date+"_"+b.time);});
    html += '<div style="margin-top:20px;text-align:left"><div class="admin-card" style="font-size:13px"><div class="admin-label">Resumo de Agendamentos</div><div class="admin-summary">'+booked+' reservado(s) · '+avail+' disponível(is)</div>';
    if (bookedList.length > 0) {
      html += '<table><thead><tr><th>Nome</th><th>Dia</th><th>Horário</th></tr></thead><tbody>';
      for (var bi = 0; bi < bookedList.length; bi++) {
        var b = bookedList[bi];
        html += '<tr><td>'+esc(b.name)+'</td><td>'+(DAYS[b.date]||b.date)+'</td><td>'+b.time+'</td></tr>';
      }
      html += '</tbody></table>';
    }
    html += '</div><div class="center" style="margin-top:12px"><button class="btn btn-secondary btn-danger" id="resetBtn">Resetar Tudo</button></div></div>';
  }
  html += '</div>';
  return html;
}

function bindBooking() {
  var ce = document.getElementById("closeError"); if (ce) ce.addEventListener("click", function() { state.error = null; render(); });
  var cc = document.getElementById("closeConfirm"); if (cc) cc.addEventListener("click", function() { state.confirmation = null; render(); });
  document.querySelectorAll(".slot:not(.booked)").forEach(function(el) {
    el.addEventListener("click", function() {
      var id = el.dataset.slot;
      state.selectedSlot = (state.selectedSlot === id) ? null : id;
      state.error = null; render();
    });
  });
  var bookBtn = document.getElementById("bookBtn");
  var nameInput = document.getElementById("nameInput");
  var cancelBtn = document.getElementById("cancelBtn");
  if (bookBtn) {
    var doBook = async function() {
      var name = nameInput ? nameInput.value.trim() : "";
      if (!name || !state.selectedSlot) return;
      bookBtn.textContent = "Reservando..."; bookBtn.disabled = true;
      try {
        var res = await fetch(API, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "book", slotId: state.selectedSlot, name: name }) });
        var data = await res.json();
        if (!res.ok) { state.error = data.error || "Erro ao reservar."; state.selectedSlot = null; await refreshSlots(); render(); return; }
        state.confirmation = { name: name, slot: data.slot }; state.selectedSlot = null; await refreshSlots(); render();
      } catch (e) { state.error = "Erro de conexão. Tente novamente."; render(); }
    };
    bookBtn.addEventListener("click", doBook);
    if (nameInput) nameInput.addEventListener("keydown", function(e) { if (e.key === "Enter" && nameInput.value.trim()) doBook(); });
  }
  if (cancelBtn) cancelBtn.addEventListener("click", function() { state.selectedSlot = null; render(); });
  var at = document.getElementById("adminToggle");
  if (at) at.addEventListener("click", async function() { state.showAdmin = !state.showAdmin; if (state.adminAuth) await refreshSlots(); render(); });
  var alb = document.getElementById("adminLoginBtn");
  if (alb) alb.addEventListener("click", function() { tryAdminLogin(); });
  var ap = document.getElementById("adminPwd");
  if (ap) ap.addEventListener("keydown", function(e) { if (e.key === "Enter") tryAdminLogin(); });
  var rb = document.getElementById("resetBtn");
  if (rb) rb.addEventListener("click", async function() {
    if (!confirm("Tem certeza? Isso apagará todos os agendamentos e republicará os slots originais.")) return;
    await fetch(API, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "reset" }) });
    state.slots = buildSlots();
    state.showAdmin = false; state.adminAuth = false;
    var config = { title: TITLE, duration: 15, createdAt: new Date().toISOString() };
    await fetch(API, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "publish", config: config, slots: state.slots }) });
    render();
  });
}

function tryAdminLogin() {
  var pwd = document.getElementById("adminPwd");
  if (pwd && pwd.value === ADMIN_PIN) { state.adminAuth = true; refreshSlots().then(render); }
  else { var pe = document.getElementById("pwdError"); if (pe) pe.style.display = "block"; }
}
async function refreshSlots() {
  try { var res = await fetch(API); var data = await res.json(); if (data.slots) state.slots = data.slots; } catch (e) {}
}
function esc(s) { if (!s) return ""; var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
loadData();
</script>
</body>
</html>
